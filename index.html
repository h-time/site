<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>H-TIME | Luxury Experience</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --accent:#d4af37;
      --bg:#0b0b0b;
      --muted:#bdbdbd;
    }
    html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:'Montserrat',sans-serif;}
    nav{
      position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;
      background-color:rgba(0,0,0,0.55);backdrop-filter:blur(8px);z-index:50;border-bottom:1px solid rgba(255,255,255,0.03);
    }
    .nav-left{display:flex;align-items:center;gap:18px;}
    .logo{font-family:'DM Serif Display',serif;font-size:1.4rem;color:#fff;text-decoration:none;}
    .nav-links a{color:#fff;text-decoration:none;margin-right:14px;font-weight:500;}
    .nav-icons{display:flex;align-items:center;gap:12px;}
    .cart-btn{color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,0.12);padding:6px 12px;border-radius:20px;}
    .lang-select{
      background:#fff;color:#000;border:1px solid rgba(0,0,0,0.12);padding:6px 10px;border-radius:20px;cursor:pointer;font-weight:600;
      font-size:0.85rem;text-transform:uppercase;
    }
    .lang-select option{color:#000;}
    .hero{height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 20px;background-image:url('img/hero-default.jpg');background-size:cover;background-position:center;position:relative;}
    .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.45),rgba(0,0,0,0.65));}
    .hero-inner{position:relative;z-index:2;color:#fff;max-width:1100px;}
    .hero h1{font-family:'DM Serif Display',serif;font-size:4rem;margin:0;}
    .hero h4{margin:18px 0;color:var(--muted);font-weight:300;}
    .sale-section{padding:48px 20px;background:#070707;}
    .sale-title{color:var(--accent);font-weight:700;margin-bottom:18px;}
    .sale-row{display:flex;gap:18px;overflow:auto;padding-bottom:8px;}
    .sale-card{min-width:260px;background:#111;border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,0.04);cursor:pointer;flex:0 0 auto;}
    .sale-card img{width:100%;height:160px;object-fit:cover;border-radius:8px;}
    .sale-card h3{margin:10px 0 6px;font-size:1.05rem;}
    .sale-card p{margin:0;color:var(--muted);font-size:0.9rem;}
    footer{padding:36px 20px;background:#050505;color:var(--muted);margin-top:40px;}
    @media (max-width:720px){
      .hero h1{font-size:2.6rem;}
      .sale-card{min-width:200px;}
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <a class="logo" href="index.html" data-translate="nav_brand">H-TIME</a>
      <div class="nav-links">
        <a href="index.html" data-translate="nav_home">Acasă</a>
        <a href="magazin.html" data-translate="nav_shop">Magazin</a>
        <a href="despre-noi.html" data-translate="nav_about">Despre Noi</a>
        <a href="echipa.html" data-translate="nav_team">Echipa H-Time</a>
        <a href="contact.html" data-translate="nav_contact">Contactează-ne</a>
      </div>
    </div>

    <div class="nav-icons">
      <select id="language-selector" class="lang-select" aria-label="Selectează limba">
        <option value="ro">RO</option>
        <option value="en">EN</option>
      </select>

      <a href="checkout.html" id="cart-nav-btn" class="cart-btn">Cart (0)</a>
    </div>
  </nav>

  <section class="hero" id="hero">
    <div class="hero-inner">
      <h1 data-translate="hero_title">H-TIME</h1>
      <h4><span class="text-highlight" data-translate="hero_subtitle">Emoții sculptate în eleganță</span></h4>
    </div>
  </section>

  <section class="sale-section">
    <h2 class="sale-title" data-translate="sale_title">Oferte Exclusive</h2>
    <div id="sale-row" class="sale-row" aria-live="polite"></div>
  </section>

  <footer>
    <div>
      <strong data-translate="footer_about_title">Despre H-TIME</strong>
      <p data-translate="footer_about_text">Bijuterii și ceasuri premium, create cu atenție la detaliu.</p>
    </div>
  </footer>

  <script src="produse.js"></script>

  <script type="module">
    async function applyTranslations(dict){
      document.querySelectorAll("[data-translate]").forEach(el=>{
        const key = el.getAttribute("data-translate");
        if(!key) return;
        if(dict && dict[key]) el.textContent = dict[key];
      });
    }

    async function loadLanguage(lang){
      try{
        const file = lang === "en" ? "./engleza.js" : "./romana.js";
        const mod = await import(file);
        if(mod && mod.translations) applyTranslations(mod.translations);
        localStorage.setItem("site_language", lang);
      }catch(err){
        console.warn("Nu am putut încărca fișierul de limbă:", err);
      }
    }

    const langSelect = document.getElementById("language-selector");
    const savedLang = localStorage.getItem("site_language") || "ro";
    langSelect.value = savedLang;
    loadLanguage(savedLang);

    langSelect.addEventListener("change", (e)=>{
      loadLanguage(e.target.value);
    });

    function createSaleCard(p){
      const identifier = p.id ? `id=${encodeURIComponent(p.id)}` : `nume=${encodeURIComponent(p.nume)}`;
      const card = document.createElement("div");
      card.className = "sale-card";
      card.setAttribute("role","button");
      card.setAttribute("tabindex","0");
      card.innerHTML = `
        <img src="${p.imagine || 'img/placeholder.jpg'}" alt="${p.nume}">
        <h3>${p.nume}</h3>
        <p>${p.pret ? p.pret + ' €' : ''}</p>
      `;
      card.addEventListener("click", ()=> {
        window.location.href = `produs.html?${identifier}`;
      });
      card.addEventListener("keypress", (ev)=>{
        if(ev.key === "Enter" || ev.key === " ") window.location.href = `produs.html?${identifier}`;
      });
      return card;
    }

    function populateSaleRow(){
      const row = document.getElementById("sale-row");
      row.innerHTML = "";
      if(typeof produse === "undefined" || !Array.isArray(produse) || !produse.length){
        const demo = [
          {id:"demo-rolex",nume:"Rolex Submariner",pret:12000,imagine:"img/rolex-submariner.jpg"},
          {id:"demo-tissot",nume:"Tissot PRX",pret:650,imagine:"img/tissot-prx.jpg"},
          {id:"demo-ring",nume:"Inel Aur 18K",pret:450,imagine:"img/inel-aur.jpg"}
        ];
        demo.forEach(d=>row.appendChild(createSaleCard(d)));
        return;
      }
      const saleItems = produse.filter(p => p.onSale).slice(0,8);
      const itemsToShow = saleItems.length ? saleItems : produse.slice(0,8);
      itemsToShow.forEach(p => row.appendChild(createSaleCard(p)));
    }

    document.addEventListener("DOMContentLoaded", ()=> {
      populateSaleRow();
    });
  </script>
</body>
</html>
