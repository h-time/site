<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H-TIME | Bijuterii și Ceasuri</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="script.js" defer></script>

    <style>
        /* --- Setări Generale și Culori --- */
        :root {
            --dark-header: #4a4541;
            --light-bg: #f5f5f5;
            --peach-bg: #fcbf88;
            --text-dark: #000000;
            --text-light: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--light-bg);
            color: var(--text-dark);
            font-size: 14px;
        }

        h1, h2, h3, .wide-font {
            font-family: 'Syncopate', sans-serif;
            text-transform: uppercase;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* --- Bara de Navigație --- */
        nav {
            background-color: var(--dark-header);
            color: var(--text-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 24px; font-weight: bold; color: #d4af37; }
        
        .nav-links { display: flex; gap: 20px; }
        .nav-links a:hover { text-decoration: underline; color: var(--peach-bg); }

        .nav-icons { display: flex; gap: 15px; align-items: center; }
        .cart-btn {
            border: 1px solid white;
            padding: 5px 15px;
            border-radius: 20px;
            background: transparent;
            color: white;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
        }
        .cart-btn:hover { background-color: white; color: black; }

        /* --- Secțiunea Hero --- */
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1523170335258-f5ed11844a49?auto=format&fit=crop&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            margin-top: 60px;
        }

        .hero h1 { font-size: 6rem; letter-spacing: 5px; margin-bottom: 20px; }
        .hero p {
            background-color: rgba(252, 191, 136, 0.8);
            color: black;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.2rem;
            font-family: 'Syncopate', sans-serif;
        }

        /* --- Secțiunea Produse --- */
        .products-section { padding: 60px 20px; text-align: center; background-color: var(--light-bg); }
        .products-section h2 { margin-bottom: 50px; font-size: 2rem; }
        .categories { display: flex; justify-content: center; gap: 50px; margin-bottom: 40px; flex-wrap: wrap; }
        .category { text-align: center; }
        .category-img { width: 200px; height: 200px; border-radius: 50%; background-color: #000; margin-bottom: 20px; object-fit: cover; }
        .category h3 { margin-bottom: 10px; }
        
        .btn-black {
            background-color: black;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-black:hover { background-color: #333; }

        /* --- Obiective --- */
        .objectives { padding: 60px 50px; background-color: white; text-align: center; }
        .objectives h2 { margin-bottom: 40px; font-size: 2.5rem; }
        .obj-grid { display: flex; justify-content: space-between; gap: 30px; text-align: left; }
        .obj-col { flex: 1; }
        .obj-col h3 { border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 15px; }

        /* --- Footer --- */
        footer {
            background-color: var(--light-bg);
            padding: 50px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #ddd;
        }

        .footer-col h3 { margin-bottom: 20px; font-size: 1.2rem; }
        .footer-col ul { display: flex; flex-direction: column; gap: 10px; }
        .footer-col a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">H-T</div>
