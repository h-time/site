<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazin | H-TIME</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Setări Generale --- */
        :root {
            --dark-header: #4a4541;
            --light-bg: #f5f5f5;
            --peach-bg: #fcbf88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Mono', monospace; background-color: var(--light-bg); color: black; padding-top: 80px; }
        h1, h2, h3, .sync-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* --- Bara de Navigație --- */
        nav {
            background-color: var(--dark-header); color: white; display: flex;
            justify-content: space-between; align-items: center; padding: 15px 50px;
            position: fixed; width: 100%; top: 0; z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: bold; color: #d4af37; font-family: 'Syncopate', sans-serif;}
        .nav-links { display: flex; gap: 20px; }
        .nav-links a:hover { text-decoration: underline; color: var(--peach-bg); }
        .cart-btn {
            border: 1px solid white; padding: 5px 15px; border-radius: 20px;
            background: transparent; color: white; cursor: pointer; font-family: 'Space Mono';
        }
        .cart-btn:hover { background-color: white; color: black; }

        /* --- Structura Magazinului --- */
        .shop-container { display: flex; max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        
        /* Sidebar Categorii */
        .sidebar { width: 200px; flex-shrink: 0; }
        .sidebar h2 { font-size: 2.5rem; margin-bottom: 20px; }
        .category-list li { margin-bottom: 15px; cursor: pointer; transition: 0.2s; }
        .category-list li:hover, .category-list li.active { font-weight: bold; text-decoration: underline; }

        /* Grid Produse */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
            flex-grow: 1;
            padding-left: 40px;
        }

        .product-card { text-align: center; }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background-color: white; margin-bottom: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .product-card h3 { font-size: 1rem; margin-bottom: 10px; min-height: 40px; }
        .product-card p { font-size: 0.9rem; margin-bottom: 15px; }
        
        .add-to-cart-btn {
            background-color: black; color: white; border: none; padding: 12px 0;
            width: 100%; border-radius: 25px; cursor: pointer; font-family: 'Space Mono';
            transition: 0.3s;
        }
        .add-to-cart-btn:hover { background-color: var(--peach-bg); color: black; }
        
        .cart-count { background: var(--peach-bg); color: black; border-radius: 50%; padding: 2px 8px; font-size: 0.8rem; margin-left: 5px; font-weight: bold; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">H-T</div>
        <div class="nav-links">
            <a href="index.html">Acasă</a>
            <a href="magazin.html">Magazin</a>
            <a href="echipa.html">Echipa H-Time</a>
            <a href="contact.html">Contactează-ne</a>
        </div>
        <div class="nav-icons">
            <a href="checkout.html">
                <button class="cart-btn">Cart <span id="cart-counter" class="cart-count">0</span></button>
            </a>
        </div>
    </nav>

    <div class="shop-container">
        <div class="sidebar">
            <p>Alege /</p>
            <h2 id="category-title">TOATE</h2>
            <ul class="category-list">
                <li class="active" onclick="filterCategory('all')">Toate</li>
                <li onclick="filterCategory('ceasuri')">Ceasuri</li>
                <li onclick="filterCategory('inele')">Inele</li>
                <li onclick="filterCategory('cercei')">Cercei</li>
                <li onclick="filterCategory('bratari')">Brățări</li>
            </ul>
        </div>

        <div class="products-grid" id="products-container">
            <div class="product-card" data-category="bratari">
                <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&w=400&q=80" alt="Bratara Unicorn">
                <h3 class="sync-font">BRATARA DIN ARGINT BABY UNICORN</h3>
                <p>€25.00</p>
                <button class="add-to-cart-btn" onclick="addToCart('Bratara Baby Unicorn', 25)">Adaugă în coș</button>
            </div>

            <div class="product-card" data-category="bratari">
                <img src="https://images.unsplash.com/photo-1573408301145-b98c4af01086?auto=format&fit=crop&w=400&q=80" alt="Bratara Paws">
                <h3 class="sync-font">BRATARA FIXA DIN ARGINT PAWS</h3>
                <p>€36.00</p>
                <button class="add-to-cart-btn" onclick="addToCart('Bratara Fixa Paws', 36)">Adaugă în coș</button>
            </div>

            <div class="product-card" data-category="ceasuri">
                <img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?auto=format&fit=crop&w=400&q=80" alt="Ceas Rolex">
                <h3 class="sync-font">CEAS ROLEX OYSTER PERPETUAL</h3>
                <p>€1300.00</p>
                <button class="add-to-cart-btn" onclick="addToCart('Ceas Rolex Oyster', 1300)">Adaugă în coș</button>
            </div>

            <div class="product-card" data-category="inele">
                <img src="https://images.unsplash.com/photo-1605100804763-247f66126e28?auto=format&fit=crop&w=400&q=80" alt="Inel Diamante">
                <h3 class="sync-font">INEL DIN ARGINT CU DIAMANTE</h3>
                <p>€93.00</p>
                <button class="add-to-cart-btn" onclick="addToCart('Inel Argint Diamante', 93)">Adaugă în coș</button>
            </div>
        </div>
    </div>

    <script>
        // Funcția de filtrare a produselor
        function filterCategory(category) {
            const products = document.querySelectorAll('.product-card');
            const title = document.getElementById('category-title');
            
            // Schimbă titlul
            title.innerText = category.toUpperCase();

            // Arată/ascunde produsele
            products.forEach(product => {
                if(category === 'all' || product.getAttribute('data-category') === category) {
                    product.style.display = 'block';
                } else {
                    product.style.display = 'none';
                }
            });
        }

        // Funcția de adăugare în coș
        function addToCart(name, price) {
            // Luăm coșul existent din memorie sau creăm unul gol
            let cart = JSON.parse(localStorage.getItem('htimeCart')) || [];
            
            // Adăugăm produsul nou
            cart.push({ name: name, price: price });
            
            // Salvăm înapoi în memoria browserului
            localStorage.setItem('htimeCart', JSON.stringify(cart));
            
            // Actualizăm numărul de pe buton
            updateCartCounter();
            
            alert(name + " a fost adăugat în coș!");
        }

        // Funcția care actualizează numărul produselor din coș în meniu
        function updateCartCounter() {
            let cart = JSON.parse(localStorage.getItem('htimeCart')) || [];
            document.getElementById('cart-counter').innerText = cart.length;
        }

        // Rulăm actualizarea când se încarcă pagina
        window.onload = updateCartCounter;
    </script>
</body>
</html>
