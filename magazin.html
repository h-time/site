<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazin | H-TIME</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-header: #4a4541;
            --light-bg: #f5f5f5;
            --peach-bg: #fcbf88;
            --footer-bg: #efe8e4;
            --accent-black: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Space Mono', monospace; background-color: var(--light-bg); color: black; padding-top: 80px; display: flex; flex-direction: column; min-height: 100vh; }
        h1, h2, h3, .sync-font { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }
        a { text-decoration: none; color: inherit; }

        /* --- Navigație --- */
        nav { background-color: var(--dark-header); color: white; display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo img { height: 75px; width: auto; object-fit: contain; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a:hover { text-decoration: underline; color: var(--peach-bg); }
        .nav-icons { display: flex; align-items: center; gap: 25px; }
        .cart-btn { border: 1px solid white; padding: 8px 20px; border-radius: 30px; transition: 0.3s; }

        /* --- Layout Magazin --- */
        .shop-container { display: flex; width: 100%; max-width: 1400px; margin: 40px auto; padding: 0 20px; flex-grow: 1; }
        .sidebar { width: 250px; flex-shrink: 0; padding-right: 30px; border-right: 1px solid #ddd; }
        
        /* Categorie Sidebar */
        .sidebar p { font-size: 0.75rem; color: #888; margin-bottom: 5px; }
        .sidebar h2 { font-size: 1.5rem; margin-bottom: 25px; text-transform: uppercase; }
        .category-list { list-style: none; margin-bottom: 40px; }
        .category-list li { margin-bottom: 12px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; text-transform: uppercase; }
        .category-list li:hover, .category-list li.active { font-weight: bold; color: var(--peach-bg); }

        /* --- FILTRE NOI --- */
        .filter-group { margin-bottom: 35px; }
        .filter-group h4 { font-size: 0.7rem; color: #888; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Dual Slider Style */
        .slider-wrapper { position: relative; width: 100%; height: 25px; display: flex; align-items: center; }
        .slider-track { position: absolute; width: 100%; height: 4px; background: #ddd; border-radius: 5px; z-index: 1; }
        .slider-inner-track { position: absolute; height: 4px; background: var(--accent-black); border-radius: 5px; z-index: 2; }
        .slider-wrapper input[type="range"] {
            position: absolute; width: 100%; background: none; pointer-events: none; -webkit-appearance: none; z-index: 3; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: white; 
            border: 2px solid var(--accent-black); cursor: pointer; pointer-events: auto;
        }
        .price-labels { display: flex; justify-content: space-between; margin-top: 10px; font-weight: bold; font-size: 0.85rem; }

        /* Sort Dropdown */
        .sort-select { width: 100%; padding: 10px; font-family: 'Space Mono'; border: 1px solid #ddd; border-radius: 5px; background: white; }

        /* Products Grid */
        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; flex-grow: 1; padding-left: 40px; margin-bottom: 60px; }

        /* Product Card */
        .product-card { position: relative; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .img-container { position: relative; overflow: hidden; border-radius: 5px; margin-bottom: 15px; aspect-ratio: 1/1; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .hover-img { position: absolute; top: 0; left: 0; opacity: 0; }
        .product-card:hover .hover-img { opacity: 1; }
        .product-card:hover .main-img { opacity: 0; }

        .product-card h3 { font-size: 0.8rem; margin-bottom: 10px; height: 40px; overflow: hidden; }
        .price-box { margin-bottom: 15px; font-weight: bold; }
        .old-price { text-decoration: line-through; color: #888; font-size: 0.8rem; margin-right: 5px; }
        .new-price { color: #e44d26; }

        .add-to-cart-btn { background: black; color: white; border: none; padding: 12px; border-radius: 25px; cursor: pointer; width: 100%; font-family: 'Space Mono'; text-transform: uppercase; font-size: 0.75rem; text-align: center; }
        .add-to-cart-btn:hover { background: var(--peach-bg); color: black; }

        footer { background-color: var(--footer-bg); padding: 60px 50px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 30px; margin-top: auto; }
        
        @media (max-width: 1024px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

     <nav>
        <a href="index.html" class="logo">
            <img src="logo.png" alt="Logo H-Time" style="height: 75px; width: auto; object-fit: contain; margin-top: 3px;">
        </a>
        <div class="nav-links">
            <a href="index.html">Acasă</a>
            <a href="magazin.html">Magazin</a>
            <a href="despre-noi.html">Despre Noi</a>
            <a href="echipa.html">Echipa H-Time</a>
            <a href="contact.html">Contactează-ne</a>
        </div>
        
        <div class="nav-icons">
            <a href="#">Login</a>
            <a href="#" class="social-icon" title="Instagram">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                </svg>
            </a>
            <a href="checkout.html" id="cart-nav-btn" class="cart-btn">Cart (0)</a>
        </div>
    </nav>


    <div class="shop-container">
        <div class="sidebar">
            <p>Filtrează /</p>
            <h2 id="category-title">TOATE</h2>
            
            <ul class="category-list">
                <li class="active" onclick="updateFilters({cat: 'all'}, event)">Toate</li>
                <li onclick="updateFilters({cat: 'ceasuri'}, event)">Ceasuri</li>
                <li onclick="updateFilters({cat: 'inele'}, event)">Inele</li>
                <li onclick="updateFilters({cat: 'cercei'}, event)">Cercei</li>
                <li onclick="updateFilters({cat: 'bratari'}, event)">Brățări</li>
            </ul>

            <div class="filter-group">
                <h4>Interval Preț</h4>
                <div class="slider-wrapper">
                    <div class="slider-track"></div>
                    <div id="inner-track" class="slider-inner-track"></div>
                    <input type="range" id="min-price" min="0" max="2000" value="0" oninput="handlePriceSlider()">
                    <input type="range" id="max-price" min="0" max="2000" value="2000" oninput="handlePriceSlider()">
                </div>
                <div class="price-labels">
                    <span>€<span id="min-val">0</span></span>
                    <span>€<span id="max-val">2000</span></span>
                </div>
            </div>

            <div class="filter-group">
                <h4>Sortează</h4>
                <select class="sort-select" onchange="updateFilters({sort: this.value})">
                    <option value="default">Implicit</option>
                    <option value="price-asc">Preț: Mic la Mare</option>
                    <option value="price-desc">Preț: Mare la Mic</option>
                </select>
            </div>
        </div>

        <div class="products-grid" id="products-container"></div>
    </div>

    <footer>
        <div class="footer-col">
            <h3>H-TIME</h3>
            <p>Copyright © 2026 H-TIME FE.</p>
        </div>
        <div class="footer-col">
            <h3>LOCATION</h3>
            <p>Strada Milcov 18A, Iași</p>
        </div>
    </footer>

    <script src="produse.js"></script>
    <script>
        // Starea filtrelor
        let state = {
            category: 'all',
            sortType: 'default',
            minP: 0,
            maxP: 2000
        };

        const container = document.getElementById('products-container');

        // Logica Slider Dual
        function handlePriceSlider() {
            const minInput = document.getElementById('min-price');
            const maxInput = document.getElementById('max-price');
            const innerTrack = document.getElementById('inner-track');
            
            let minVal = parseInt(minInput.value);
            let maxVal = parseInt(maxInput.value);

            if (minVal > maxVal - 100) {
                minInput.value = maxVal - 100;
                minVal = maxVal - 100;
            }

            const minPercent = (minVal / minInput.max) * 100;
            const maxPercent = (maxVal / maxInput.max) * 100;

            innerTrack.style.left = minPercent + "%";
            innerTrack.style.width = (maxPercent - minPercent) + "%";

            document.getElementById('min-val').innerText = minVal;
            document.getElementById('max-val').innerText = maxVal;

            updateFilters({minP: minVal, maxP: maxVal});
        }

        function updateFilters(params, event) {
            if (params.cat) {
                state.category = params.cat;
                document.getElementById('category-title').innerText = params.cat.toUpperCase();
                document.querySelectorAll('.category-list li').forEach(li => li.classList.remove('active'));
                if(event) event.target.classList.add('active');
            }
            if (params.sort) state.sortType = params.sort;
            if (params.minP !== undefined) state.minP = params.minP;
            if (params.maxP !== undefined) state.maxP = params.maxP;

            let filtered = produse.filter(p => {
                const matchCat = state.category === 'all' || p.categorie === state.category;
                const matchPrice = p.pret >= state.minP && p.pret <= state.maxP;
                return matchCat && matchPrice;
            });

            if (state.sortType === 'price-asc') filtered.sort((a,b) => a.pret - b.pret);
            if (state.sortType === 'price-desc') filtered.sort((a,b) => b.pret - a.pret);

            renderProducts(filtered);
        }

        function renderProducts(lista) {
            container.innerHTML = lista.length === 0 ? "<p>Niciun produs găsit.</p>" : "";
            lista.forEach(p => {
                let priceHTML = p.isSale 
                    ? `<div class="price-box"><span class="old-price">€${p.pretVechi}</span> <span class="new-price">€${p.pret}</span></div>`
                    : `<div class="price-box"><span class="regular-price">€${p.pret}</span></div>`;
                
                container.innerHTML += `
                    <div class="product-card">
                        <a href="produs.html?id=${p.id}">
                            <div class="img-container">
                                <img src="${p.imagine}" class="main-img">
                                <img src="${p.galerie ? p.galerie[0] : p.imagine}" class="hover-img">
                            </div>
                            <h3 class="sync-font">${p.nume}</h3>
                        </a>
                        ${priceHTML}
                        <a href="produs.html?id=${p.id}" class="add-to-cart-btn">Vezi Produs</a>
                    </div>
                `;
            });
        }

        function updateCartCounter() {
            let cart = JSON.parse(localStorage.getItem('htimeCart')) || [];
            const cartBtn = document.getElementById('cart-nav-btn');
            if(cartBtn) cartBtn.innerText = `Cart (${cart.length})`;
        }

        window.onload = () => {
            handlePriceSlider();
            updateCartCounter();
        };
    </script>
</body>
</html>
