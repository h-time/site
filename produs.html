<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalii Produs | H-TIME</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --peach: #fcbf88;
      --pink: #ffb6c1;
      --dark: #111111;
      --light-bg: #f8f5f2;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      background-color: var(--light-bg);
      color: var(--dark);
      overflow-x: hidden;
      display: flex; 
      flex-direction: column; 
      min-height: 100vh;
      padding-top: 100px;
    }
    h1,h2,h3,h4 { font-weight: normal; }

    @keyframes textGradientMove { 
      0% { background-position: 0% 50%; } 
      100% { background-position: 200% 50%; } 
    }

    /* ================= NAVIGAȚIE ================= */
    nav {
      position: fixed;
      top:0; left:0; width:100%;
      padding:15px 50px;
      display:flex; justify-content:space-between; align-items:center;
      z-index:1000;
      background-color: var(--dark);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-family: 'Montserrat', sans-serif;
    }
    .logo img { height:75px; }
    .nav-links { display:flex; gap:30px; }
    .nav-links a {
      color:white; text-decoration:none; font-weight:500; font-size:0.9rem;
      text-transform:uppercase; letter-spacing:1px; transition: color .3s;
    }
    .nav-links a:hover { color: var(--peach); }

    .nav-icons { display:flex; align-items:center; gap:20px; }
    .nav-icons a { color:white; text-decoration:none; font-size:0.9rem; text-transform:uppercase; transition: all .3s; }
    .nav-icons a:hover { color: var(--peach); }
    .cart-btn {
      border:1px solid white; padding:8px 18px; border-radius:30px;
      display:inline-flex; align-items:center; justify-content:center; transition: all .3s;
    }
    .cart-btn:hover { border-color: var(--peach); }

    /* ================= DETALII PRODUS ================= */
    .product-wrapper {
      display: flex;
      max-width: 1200px;
      margin: 60px auto 100px;
      padding: 0 40px;
      gap: 60px;
      flex-grow: 1;
      align-items: flex-start;
    }

    .product-gallery {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .main-image-container {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 12px;
      overflow: hidden;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .main-image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .thumbnail-list { display: flex; gap: 15px; }
    .thumb-item {
      width: 80px; height: 80px;
      border-radius: 8px; overflow: hidden;
      cursor: pointer; border: 2px solid transparent; transition: 0.3s;
    }
    .thumb-item.active { border-color: var(--dark); }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

    .product-info { flex: 1; display: flex; flex-direction: column; }

    .breadcrumb {
      font-size: 0.85rem; color: #888;
      margin-bottom: 20px; text-transform: uppercase;
      letter-spacing: 1px;
    }
    .breadcrumb a { color: #888; text-decoration: none; }
    .breadcrumb a:hover { color: var(--dark); }

    .product-title {
      font-family: 'Syncopate', sans-serif;
      font-weight: 700;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      color: var(--dark);
      line-height: 1.2;
      margin-bottom: 15px;
    }

    .product-price-box {
      display: flex; align-items: center;
      gap: 15px; margin-bottom: 30px;
      font-weight: 700;
    }
    .price-current { font-size: 1.8rem; color: var(--dark); }
    .price-old { font-size: 1.2rem; color: #aaa; text-decoration: line-through; }

    .sale-badge {
      background: linear-gradient(to right, var(--pink), var(--peach));
      color: black; padding: 5px 12px; border-radius: 4px;
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
    }

    .product-description {
      font-size: 1.05rem; line-height: 1.8;
      color: #444; margin-bottom: 40px;
      padding-top: 30px; border-top: 1px solid #ddd;
    }

    .add-to-cart-big-btn {
      background: var(--dark); color: white; border: none;
      padding: 18px 40px; font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; border-radius: 40px; cursor: pointer;
      transition: all 0.3s; display: inline-flex; align-items: center;
      justify-content: center; gap: 10px; max-width: 350px;
    }
    .add-to-cart-big-btn:hover {
      background: linear-gradient(to right, var(--pink), var(--peach));
      color: black; transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .benefits-list { margin-top: 40px; list-style: none; }
    .benefits-list li {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.95rem; font-weight: 500; color: #666; margin-bottom: 12px;
    }
    .benefits-list svg { color: var(--peach); }

    /* TOAST */
    .toast-notification {
      position: fixed; bottom: -100px; left: 50%;
      transform: translateX(-50%); background: var(--dark);
      color: white; padding: 15px 30px; border-radius: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 9999; display: flex; align-items: center; gap: 10px;
    }
    .toast-notification.show { bottom: 40px; }

    /* ================= FOOTER ================= */
    footer { 
      background-color:#0b0b0b; padding:80px 50px 30px;
      display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap:40px; color:#fff; border-top:1px solid #222;
      font-family: 'Montserrat', sans-serif;
    }
    .footer-col h2 { font-family:'DM Serif Display',serif; color:var(--peach); font-size:2.2rem; margin-bottom:20px; }
    .footer-col h3 { font-size:1rem; font-weight:700; margin-bottom:30px; letter-spacing:1px; text-transform:uppercase; color:#fff; }
    .footer-desc { font-size:0.9rem; color:#999; line-height:1.8; margin-bottom:30px; }
    .social-links { display:flex; gap:15px; }
    .social-icon-circle { width:40px; height:40px; background:#222; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; text-decoration:none; transition:.3s; }
    .social-icon-circle:hover { background: linear-gradient(to right, var(--pink), var(--peach)); color:black; transform:translateY(-3px); }
    .footer-col ul { list-style:none; padding:0; display:flex; flex-direction:column; gap:15px; }
    .footer-col ul a { text-decoration:none; color:#999; font-size:0.9rem; transition:.3s; display:inline-block; }
    .footer-col ul a:hover { color:var(--peach); transform:translateX(5px); }
    .footer-bottom { grid-column:1 / -1; text-align:center; padding-top:40px; border-top:1px solid #222; color:#555; font-size:0.8rem; margin-top:20px; }
    .anpc-img { max-width:180px; width:100%; height:auto; display:block; margin-bottom:15px; transition:opacity .3s; }
    .anpc-img:hover { opacity:0.7; }

    @media (max-width: 992px) { .product-wrapper { flex-direction: column; } }
    @media (max-width:768px) {
      nav { flex-direction:column; gap:15px; padding:15px; background:rgba(0,0,0,0.8); }
      .nav-links { flex-wrap:wrap; justify-content:center; gap:15px; }
      footer { padding:40px 20px; display:flex; flex-direction:column; }
      body { padding-top: 130px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a href="index.html" class="logo"><img src="logo.png" alt="H-TIME Logo"></a>
    <div class="nav-links">
      <a href="index.html" data-i18n="nav_home">Acasă</a>
      <a href="magazin.html" data-i18n="nav_shop">Magazin</a>
      <a href="despre-noi.html" data-i18n="nav_about">Despre Noi</a>
      <a href="echipa.html" data-i18n="nav_team">Echipa H-Time</a>
      <a href="contact.html" data-i18n="nav_contact">Contactează-ne</a>
    </div>
    <div class="nav-icons">
      <select id="languageSwitcher" style="background:black;border:1px solid rgba(255,255,255,0.12);color:white;padding:6px 8px;border-radius:6px;font-size:0.85rem;text-transform:uppercase; font-family: 'Montserrat', sans-serif;">
        <option value="ro">RO</option>
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="de">DE</option>
        <option value="es">ES</option>
        <option value="it">IT</option>
      </select>
      <a href="checkout.html" id="cart-nav-btn" class="cart-btn" style="font-family: 'Montserrat', sans-serif;">Cart (0)</a>
    </div>
  </nav>

  <!-- PRODUCT CONTAINER -->
  <div class="product-wrapper" id="product-container"></div>

  <!-- TOAST -->
  <div id="toast" class="toast-notification">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--peach)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    <span id="toast-message">Produs adăugat!</span>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-col">
      <h2>H-TIME</h2>
      <p class="footer-desc" data-i18n="footer_desc">Emoții sculptate în eleganță. Lux și rafinament.</p>
      <div class="social-links">
        <a href="#" class="social-icon-circle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg></a>
        <a href="#" class="social-icon-circle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>
      </div>
    </div>
    <div class="footer-bottom">© 2024 - 2026 H-TIME Luxury Experience. Toate drepturile rezervate.</div>
  </footer>

  <script src="produse.js"></script>
  <script>
    let currentProduct = null;
    const currencyConfig = {
      ro: { symbol: 'Lei', rate: 4.97, position: 'right' },
      en: { symbol: '$', rate: 1.08, position: 'left' },
      fr: { symbol: '€', rate: 1.0, position: 'right' },
      de: { symbol: '€', rate: 1.0, position: 'right' },
      es: { symbol: '€', rate: 1.0, position: 'right' },
      it: { symbol: '€', rate: 1.0, position: 'right' }
    };

    function formatPrice(priceEur, lang) {
      if (!priceEur) return "";
      const config = currencyConfig[lang] || currencyConfig.ro;
      const converted = Math.round(parseFloat(priceEur) * config.rate);
      return config.position === 'left' ? `${config.symbol}${converted}` : `${converted} ${config.symbol}`;
    }

    // --- FUNCTIA REPARATA PENTRU TRADUCERI ---
    function getLocalizedField(product, field, lang) {
      // 1. Cauta traducerea specifica: ex product['descriere_en']
      if (lang !== 'ro' && product[`${field}_${lang}`]) {
        return product[`${field}_${lang}`];
      }
      // 2. Fallback la varianta principala (RO)
      return product[field] || "";
    }

    function renderProduct() {
      const currentLang = localStorage.getItem('htime_lang') || 'ro';
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');

      let srcProduse = typeof produse !== 'undefined' ? produse : [];
      currentProduct = srcProduse.find(p => p.id == productId);

      const container = document.getElementById('product-container');
      if (!currentProduct) {
        container.innerHTML = `<h2 style="text-align:center; width:100%; margin-top:50px;">Produsul nu a fost găsit.</h2>`;
        return;
      }

      const nume = getLocalizedField(currentProduct, 'nume', currentLang);
      const desc = getLocalizedField(currentProduct, 'descriere', currentLang);
      const pretNou = formatPrice(currentProduct.pret, currentLang);
      const pretVechi = currentProduct.pretVechi ? formatPrice(currentProduct.pretVechi, currentLang) : "";

      let imagini = [currentProduct.imagine, ...(currentProduct.galerie || [])];
      let thumbsHTML = imagini.length > 1 ? imagini.map((img, i) => `
        <div class="thumb-item ${i === 0 ? 'active' : ''}" onclick="document.getElementById('main-image').src='${img}'; this.parentElement.querySelectorAll('.thumb-item').forEach(t=>t.classList.remove('active')); this.classList.add('active');">
          <img src="${img}" onerror="this.src='https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?q=80&w=100'">
        </div>`).join('') : "";

      container.innerHTML = `
        <div class="product-gallery">
          <div class="main-image-container"><img id="main-image" src="${imagini[0]}"></div>
          <div class="thumbnail-list">${thumbsHTML}</div>
        </div>
        <div class="product-info">
          <div class="breadcrumb"><a href="magazin.html">Magazin</a> / ${currentProduct.categorie.toUpperCase()}</div>
          <h1 class="product-title">${nume}</h1>
          <div class="product-price-box">
            <span class="price-current">${pretNou}</span>
            ${pretVechi ? `<span class="price-old">${pretVechi}</span><span class="sale-badge">SALE</span>` : ""}
          </div>
          <p class="product-description">${desc}</p>
          <button class="add-to-cart-big-btn" onclick="addToCart()">Adaugă în Coș</button>
        </div>`;
      
      applyInterfaceTranslations(currentLang);
    }

    function addToCart() {
      let cart = JSON.parse(localStorage.getItem('htimeCart')) || [];
      cart.push(currentProduct);
      localStorage.setItem('htimeCart', JSON.stringify(cart));
      updateCartCounter();
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function updateCartCounter() {
      const cart = JSON.parse(localStorage.getItem('htimeCart')) || [];
      const btn = document.getElementById('cart-nav-btn');
      if(btn) btn.innerText = `Cart (${cart.length})`;
    }

    const interfaceTranslations = {
      ro: { nav_home: "Acasă", nav_shop: "Magazin", nav_about: "Despre Noi", nav_team: "Echipa", nav_contact: "Contact", add: "Adaugă în Coș", toast: "Produs adăugat!" },
      en: { nav_home: "Home", nav_shop: "Shop", nav_about: "About", nav_team: "Team", nav_contact: "Contact", add: "Add to Cart", toast: "Product added!" },
      fr: { nav_home: "Accueil", nav_shop: "Boutique", nav_about: "À propos", nav_team: "Équipe", nav_contact: "Contact", add: "Ajouter au panier", toast: "Produit ajouté!" },
      de: { nav_home: "Startseite", nav_shop: "Shop", nav_about: "Über uns", nav_team: "Team", nav_contact: "Kontakt", add: "In den Warenkorb", toast: "Hinzugefügt!" },
      es: { nav_home: "Inicio", nav_shop: "Tienda", nav_about: "Nosotros", nav_team: "Equipo", nav_contact: "Contacto", add: "Añadir al Carrito", toast: "¡Producto añadido!" },
      it: { nav_home: "Home", nav_shop: "Negozio", nav_about: "Chi Siamo", nav_team: "Team", nav_contact: "Contatti", add: "Aggiungi al Carrello", toast: "Prodotto aggiunto!" }
    };

    function applyInterfaceTranslations(lang) {
      const dict = interfaceTranslations[lang] || interfaceTranslations.ro;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key]) el.innerHTML = dict[key];
      });
      const addBtn = document.querySelector('.add-to-cart-big-btn');
      if(addBtn) addBtn.innerText = dict.add;
      document.getElementById('toast-message').innerText = dict.toast;
    }

    window.onload = () => {
      const switcher = document.getElementById('languageSwitcher');
      const saved = localStorage.getItem('htime_lang') || 'ro';
      switcher.value = saved;
      renderProduct();
      updateCartCounter();
      switcher.onchange = () => {
        localStorage.setItem('htime_lang', switcher.value);
        renderProduct();
      };
    };
  </script>
</body>
</html>
